<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社团管理 - 校园社团管理系统</title>
    <link href="//unpkg.com/layui@2.9.20/dist/css/layui.css" rel="stylesheet">
    <link href="/src/css/style.css" rel="stylesheet">
</head>
<body>

<div class="layui-layout layui-layout-admin">
    <!-- Header/Sidebar Injected -->
    
    <div class="layui-body" style="padding: 15px;">
        <div class="layui-breadcrumb" style="visibility: visible; margin-bottom: 20px;">
          <a href="/index.html">首页</a>
          <a><cite>社团管理</cite></a>
        </div>

        <div class="layui-card">
            <div class="layui-card-header">社团列表</div>
            <div class="layui-card-body">
                <form class="layui-form" action="" style="margin-bottom: 15px;">
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md9">
                            <div class="layui-form-item" style="margin-bottom: 0; margin-left: -40px;">
                                <div class="layui-inline">
                                    <label class="layui-form-label">所属学院</label>
                                    <div class="layui-input-inline">
                                        <select name="college" lay-filter="filter">
                                            <option value="">全部</option>
                                            <option value="信息工程学院">信息工程学院</option>
                                            <option value="艺术学院">艺术学院</option>
                                            <option value="体育学院">体育学院</option>
                                            <option value="外国语学院">外国语学院</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label">社团类型</label>
                                    <div class="layui-input-inline">
                                        <select name="type" lay-filter="filter">
                                            <option value="">全部</option>
                                            <option value="学术类">学术类</option>
                                            <option value="文艺类">文艺类</option>
                                            <option value="体育类">体育类</option>
                                            <option value="公益类">公益类</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md3" style="text-align: right;">
                             <a href="add.html" class="layui-btn layui-btn-normal">
                                <i class="layui-icon layui-icon-add-1"></i> 添加社团
                            </a>
                        </div>
                    </div>
                </form>

                <table id="clubTable" lay-filter="clubTable"></table>

                <!-- Tool Bar -->
                <script type="text/html" id="barDemo">
                    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
                    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
                </script>
            </div>
        </div>
    </div>
</div>

<script src="//unpkg.com/layui@2.9.20/dist/layui.js"></script>
<script src="/src/js/common.js"></script>
<script src="/src/js/club.js"></script>
</body>
</html>
