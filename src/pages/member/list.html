<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成员管理 - 校园社团管理系统</title>
    <link href="//unpkg.com/layui@2.9.20/dist/css/layui.css" rel="stylesheet">
    <link href="/src/css/style.css" rel="stylesheet">
</head>
<body>

<div class="layui-layout layui-layout-admin">
    <!-- Injected -->
    
    <div class="layui-body" style="padding: 15px;">
        <div class="layui-breadcrumb" style="margin-bottom: 20px;">
          <a href="/index.html">首页</a>
          <a><cite>成员管理</cite></a>
        </div>

        <div class="layui-card">
            <div class="layui-card-header">成员列表</div>
            <div class="layui-card-body">
                <div class="layui-form layui-row layui-col-space15" style="margin-bottom: 15px;">
                    <div class="layui-col-md3">
                        <input type="text" name="keyword" placeholder="搜索姓名或学号" autocomplete="off" class="layui-input">
                    </div>
                    <div class="layui-col-md2">
                        <button class="layui-btn" lay-submit lay-filter="search">
                            <i class="layui-icon layui-icon-search"></i> 搜索
                        </button>
                    </div>
                    <div class="layui-col-md7" style="text-align: right;">
                        <a href="add.html" class="layui-btn layui-btn-normal">
                            <i class="layui-icon layui-icon-add-1"></i> 添加成员
                        </a>
                    </div>
                </div>

                <table id="memberTable" lay-filter="memberTable"></table>
                
                <!-- Tool Bar -->
                <script type="text/html" id="barDemo">
                    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
                    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
                </script>
            </div>
        </div>
    </div>
</div>

<script src="//unpkg.com/layui@2.9.20/dist/layui.js"></script>
<script src="/src/js/common.js"></script>
<script src="/src/js/member.js"></script>
</body>
</html>
